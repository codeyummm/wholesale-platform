<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomsday Restore Protocol</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 40px;
            box-shadow: 0 0 20px #00ff00;
            max-width: 500px;
        }
        h1 {
            color: #ff0000;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 30px;
        }
        input {
            background: #111;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px;
            width: 80%;
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            font-size: 1.2rem;
            outline: none;
        }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px #ff0000;
        }
        button:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled {
            background-color: #555;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        #status {
            margin-top: 25px;
            min-height: 20px;
            font-weight: bold;
        }
        .error { color: #ff5555; }
        .success { color: #55ff55; }
        .warning { color: #ffff55; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Critical Recovery Protocol</h1>
        <p>Warning: Initiating this sequence will overwrite the current production database with the latest DigitalOcean Spaces backup.</p>
        
        <input type="password" id="secretKey" placeholder="ENTER DOOMSDAY SECRET">
        <br>
        
        <!-- IMPORTANT: Update API_URL to match your live backend domain -->
        <button id="restoreBtn" onclick="triggerRestore()">INITIATE RESTORE</button>
        
        <div id="status"></div>
    </div>

    <script>
        // Update this URL to point to your live backend (e.g. https://api.wholesale.com/api/backup/restore)
        const API_URL = 'http://localhost:5000/api/backup/restore';

        async function triggerRestore() {
            const secret = document.getElementById('secretKey').value;
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('restoreBtn');

            if (!secret) {
                statusEl.innerHTML = '<span class="error">ERROR: Secret key required.</span>';
                return;
            }

            // Confirm before running
            const confirmAction = confirm("CRITICAL WARNING: This will drop the current database and restore the latest backup. Are you absolutely sure?");
            if (!confirmAction) return;

            statusEl.innerHTML = '<span class="warning">Initiating sequence... Contacting server...</span>';
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-doomsday-secret': secret
                    }
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    statusEl.innerHTML = '<span class="success">SUCCESS: ' + data.message + '</span>';
                } else {
                    statusEl.innerHTML = '<span class="error">FAILED: ' + (data.message || 'Server rejected the request.') + '</span>';
                    btn.disabled = false;
                }
            } catch (error) {
                statusEl.innerHTML = '<span class="error">CONNECTION FAILED: Ensure the server is online. (' + error.message + ')</span>';
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
